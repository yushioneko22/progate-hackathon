# Render Blueprint — 変ルンです API (FastAPI) + PostgreSQL
# Render ダッシュボードの "New +" → "Blueprint" でこのリポジトリを選ぶと、
# 下記の web サービスとマネージド Postgres がまとめて作成されます。
databases:
  - name: kawarun-db
    plan: free
    # web サービスと同一リージョンにすること。Render の内部接続文字列
    # (connectionString) は同一リージョン内でしか名前解決できないため。
    region: oregon
    databaseName: kawarun
    user: kawarun

services:
  - type: web
    name: kawarun-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    # 起動コマンドは Dockerfile の CMD (docker-entrypoint.sh) に任せる。
    # 同スクリプトが alembic upgrade head 実行後、$PORT で uvicorn を起動する。
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kawarun-db
          property: connectionString
      # 写真ストレージ (Supabase)。値はダッシュボードで設定する(秘密情報はコミットしない)。
      - key: SUPABASE_URL
        sync: false
      # service_role(secret) キーを設定する(anon ではアップロード不可)
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: photos
      # デプロイした Web フロントから叩く場合のみ、その URL を JSON 配列で設定する。
      # 例: ["https://kawarun-web.onrender.com"]
      # React Native アプリは CORS の対象外なので未設定でも動作する。
      # - key: CORS_ORIGINS
      #   sync: false
